{% load static %}
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漏洞利用平台</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  body, html {
    height: 100%; margin: 0;
    background: #f0f2f5;
    color: #1f2937;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex; align-items: center; justify-content: center;
  }

  .login-wrapper {
    width: 400px;
    padding: 44px 40px 40px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    box-shadow: 0 2px 16px rgba(0,0,0,.06);
  }

  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 {
    font-size: 20px; font-weight: 700;
    margin: 0 0 4px; color: #111827;
  }
  .logo p { margin: 0; font-size: 13px; color: #9ca3af; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 12px; color: #6b7280; font-weight: 500;
    margin-bottom: 5px;
  }
  .field input {
    width: 100%; height: 44px;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 0 14px;
    font-size: 15px; color: #111827;
    transition: border-color .15s, box-shadow .15s;
    font-family: inherit;
  }
  .field input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,.1);
  }
  .field input::placeholder { color: #cbd5e1; }

  .login-btn {
    width: 100%; height: 44px;
    background: #2563eb;
    color: #fff;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    margin-top: 8px;
  }
  .login-btn:hover { background: #1d4ed8; }

  .error-msg {
    display: block; text-align: center; margin-top: 12px;
    color: #dc2626; font-size: 13px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px; padding: 10px;
  }
</style>
</head>
<body>

<div class="login-wrapper">
  <div class="logo">
    <h1>漏洞利用平台</h1>
    <p>请登录以继续</p>
  </div>

  <form method="post">
    {% csrf_token %}
    {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

    <div class="field">
      <label>用户名</label>
      <input type="text" name="username" placeholder="admin" autofocus>
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" name="password" placeholder="••••••••">
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <button type="submit" class="login-btn">登录</button>
  </form>
</div>

</body>
</html>
