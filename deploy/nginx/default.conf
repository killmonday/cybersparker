# Nginx — Cybersparker 生产部署
upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # 上传文件限制，与 Django 端 MAX_UPLOAD_SIZE (100MB) 对齐
    client_max_body_size 100m;

    # 静态文件（React 壳页 + Django admin 等，由共享卷 static_data 提供）
    location /react-shell/ {
        alias /usr/share/nginx/html/react-shell/;
        try_files $uri $uri/ /react-shell/index.html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Django 静态文件（STATIC_ROOT 直接挂载为卷根目录）
    location /static/ {
        alias /usr/share/nginx/html/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 转发到 Django
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 100m;
    }

    # 文件下载入口
    location /files/ {
        proxy_pass http://django;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 登录 / 登出
    location /login {
        proxy_pass http://django;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /logout {
        proxy_pass http://django;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 运行时诊断
    location /runtime/ {
        proxy_pass http://django;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 根路径重定向到登录
    location = / {
        return 302 $scheme://$host:28600/login;
    }
}
