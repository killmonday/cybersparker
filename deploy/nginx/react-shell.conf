# ============================================================
# React Shell — Nginx 配置
# ============================================================
# 放到 /etc/nginx/sites-available/react-shell
# 然后 ln -sf ... /etc/nginx/sites-enabled/react-shell
#
# 生产模式：React JS/CSS 由 Nginx 直接返回，HTML 壳页由 Django 提供
# 开发模式：React 请求转发给 Vite dev server (:5173)
# ============================================================

server {
    listen 28600;
    server_name _;

    # 上传文件限制，与 Django 端 MAX_UPLOAD_SIZE (100MB) 对齐
    client_max_body_size 100m;

    # ---------- React 编译产物（静态文件，Nginx 直接返回）----------
    # 用 try_files 兜底：文件不存在时返回 index.html，让 BrowserRouter 接管路由
    location /react-shell/assets/ {
        alias /workspaces/cybersparker/app_cybersparker/static/react-shell/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri /react-shell/index.html;
    }

    location = /react-shell/manifest.json {
        alias /workspaces/cybersparker/app_cybersparker/static/react-shell/manifest.json;
        expires 5m;
    }

    # ---------- 运行时生成的静态文件（爬虫拉取的 favicon 等写入 STATIC_ROOT）----------
    location /static/favicons/ {
        alias /workspaces/cybersparker/static/favicons/;
        expires 7d;
    }

    # ---------- Django static（collectstatic 收集 + React 构建产物）----------
    location /static/ {
        alias /workspaces/cybersparker/app_cybersparker/static/;
        expires 7d;
    }

    # ---------- React 壳页 ----------
    # Vite build 产出 index.html，Nginx 直接返回，不经 Django
    # 开发：注释掉 alias+try_files，取消 proxy_pass 注释
    location /react-shell/ {
        # === 生产模式 ===
        alias /workspaces/cybersparker/app_cybersparker/static/react-shell/;
        try_files $uri /react-shell/index.html;

        # === 开发模式（取消下面注释，注释上面两行）===
        # proxy_pass http://127.0.0.1:5173;
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
        # proxy_set_header Host $host;
    }

    # ---------- Vite HMR（仅开发模式需要）----------
    # location ~ ^/(@vite|@react-refresh|src|node_modules)/ {
    #     proxy_pass http://127.0.0.1:5173;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    # }

    # ---------- Django API + 登录 ----------
    location /api/ {
        proxy_pass http://127.0.0.1:8999;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location /login {
        proxy_pass http://127.0.0.1:8999;
        proxy_set_header Host $http_host;
    }

    location /logout {
        proxy_pass http://127.0.0.1:8999;
        proxy_set_header Host $http_host;
    }

    # ---------- Django 旧页面（保留回退）----------
    location / {
        proxy_pass http://127.0.0.1:8999;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
